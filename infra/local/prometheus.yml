global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
  - job_name: enterprise-metrics
    static_configs:
      - targets: ["otel-collector:8889"]
  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"]
