groups:
  - name: enterprise-api
    rules:
      - alert: EnterpriseHighApiErrorRate
        expr: |
          (
            sum by (service_name) (rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[5m]))
            /
            clamp_min(sum by (service_name) (rate(http_server_request_duration_seconds_count[5m])), 0.001)
          ) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "API 5xx 比例偏高"
          description: "service_name={{ $labels.service_name }} 在過去 10 分鐘的 5xx 比例超過 5%。"

      - alert: EnterpriseOutboxBacklogGrowing
        expr: |
          (
            sum by (service_name) (enterprise_outbox_enqueued_total)
            -
            sum by (service_name) (enterprise_outbox_published_total)
          ) > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Outbox backlog 持續堆積"
          description: "service_name={{ $labels.service_name }} 的待發送 Outbox 事件超過 5 筆。"

      - alert: EnterpriseConsumerFailuresDetected
        expr: increase(enterprise_consumer_failure_total[10m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Consumer 處理失敗"
          description: "consumer={{ $labels.service_name }} 在過去 10 分鐘出現處理失敗。"

      - alert: EnterpriseRabbitMqQueueDepthHigh
        expr: sum by (queue) (rabbitmq_queue_messages) > 20
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "RabbitMQ queue depth 偏高"
          description: "queue={{ $labels.queue }} 的佇列深度超過 20，請檢查 consumer 是否卡住。"
