<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classic Docs</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
  <link rel="stylesheet" href="../shared/base.css" />
  <link rel="stylesheet" href="./theme.css" />
  <script defer src="../shared/site-ui.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script defer src="../shared/docs-manifest.js"></script>
  <script defer src="../shared/docs-app.js"></script>
</head>
<body>
  <div class="classic-layout docs-layout">
    <aside class="classic-sidebar">
      <div class="site-toolbar">
        <a class="site-brand" href="../index.html">
          <img src="../assets/favicon.svg" alt="文件站品牌圖示" />
          <span>
            <strong>Enterprise Docs Hub</strong>
            <span>Classic Docs 版</span>
          </span>
        </a>
        <button class="theme-toggle" type="button" data-theme-toggle>
          <span data-theme-toggle-label>淺色模式</span>
        </button>
      </div>
      <div class="doc-chip">Classic Docs</div>
      <input class="doc-search" data-doc-search placeholder="搜尋文件、主題、關鍵字..." />
      <div class="doc-search-status" data-doc-search-status></div>
      <nav class="classic-nav" data-doc-nav></nav>
    </aside>
    <main class="classic-main">
      <header class="classic-header">
        <div class="classic-header-copy">
          <div class="doc-breadcrumb" data-doc-breadcrumb></div>
          <h1 class="doc-title" data-doc-title></h1>
          <p class="doc-description" data-doc-description></p>
          <div class="doc-meta-row" data-doc-meta></div>
        </div>
      </header>
      <div class="classic-content-grid">
        <section class="classic-article doc-content-shell">
          <article class="classic-article-inner markdown-body" data-doc-content></article>
          <footer class="classic-footer">
            <p class="doc-footer-note">這份內容直接讀取 repo 裡的 Markdown 文件，所以你更新文件後，網站內容也會跟著更新。</p>
          </footer>
        </section>
        <aside class="classic-toc-shell">
          <div class="classic-toc-card">
            <h2>本頁目錄</h2>
            <div class="doc-toc" data-doc-toc></div>
          </div>
        </aside>
      </div>
    </main>
  </div>
</body>
</html>
