<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cards Explorer</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
  <link rel="stylesheet" href="../shared/base.css" />
  <link rel="stylesheet" href="./theme.css" />
  <script defer src="../shared/site-ui.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script defer src="../shared/docs-manifest.js"></script>
  <script defer src="../shared/docs-app.js"></script>
</head>
<body>
  <div class="cards-shell docs-layout">
    <header class="cards-hero">
      <div class="site-toolbar">
        <a class="site-brand" href="../index.html">
          <img src="../assets/favicon.svg" alt="文件站品牌圖示" />
          <span>
            <strong>Enterprise Docs Hub</strong>
            <span>Cards Explorer 版</span>
          </span>
        </a>
        <button class="theme-toggle" type="button" data-theme-toggle>
          <span data-theme-toggle-label>淺色模式</span>
        </button>
      </div>
      <a class="cards-home" href="../index.html">回文件站展示首頁</a>
      <div class="doc-chip">Cards Explorer</div>
      <h1>像逛地圖一樣找文件</h1>
      <p>這一版把導覽做成更輕鬆的卡片式閱讀。你可以先搜尋、先挑類別，再點進去看完整內容。</p>
      <input class="doc-search" data-doc-search placeholder="例如：Outbox、部署、測試、Gateway..." />
      <div class="doc-search-status" data-doc-search-status></div>
    </header>
    <section class="cards-grid">
      <aside class="cards-sidebar">
        <div class="cards-sidebar-card">
          <h2>文件清單</h2>
          <nav data-doc-nav></nav>
        </div>
      </aside>
      <main class="cards-main">
        <section class="cards-summary">
          <div class="doc-breadcrumb" data-doc-breadcrumb></div>
          <h2 class="doc-title" data-doc-title></h2>
          <p class="doc-description" data-doc-description></p>
          <div class="doc-meta-row" data-doc-meta></div>
        </section>
        <section class="cards-article doc-content-shell">
          <article class="cards-article-inner markdown-body" data-doc-content></article>
        </section>
      </main>
    </section>
  </div>
</body>
</html>
