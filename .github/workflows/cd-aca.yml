name: CD ACA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_TAG: ${{ github.sha }}
  ACA_GATEWAY_URL: ${{ secrets.ACA_GATEWAY_URL }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore EnterpriseMicroservicesBoilerplate.sln

      - name: Build
        run: dotnet build EnterpriseMicroservicesBoilerplate.sln -c Release --no-restore

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.2

      - name: Publish containers
        run: |
          docker build -f src/Gateway/Gateway.Api/Dockerfile -t $REGISTRY/gateway-api:$IMAGE_TAG .
          docker build -f src/Identity/AuthService.Api/Dockerfile -t $REGISTRY/auth-service-api:$IMAGE_TAG .
          docker build -f src/Services/Catalog/CatalogService.Api/Dockerfile -t $REGISTRY/catalog-service-api:$IMAGE_TAG .
          docker build -f src/Services/Inventory/InventoryService.Api/Dockerfile -t $REGISTRY/inventory-service-api:$IMAGE_TAG .
          docker build -f src/Services/Ordering/OrderingService.Api/Dockerfile -t $REGISTRY/ordering-service-api:$IMAGE_TAG .
          docker build -f src/Services/Notification/NotificationService.Api/Dockerfile -t $REGISTRY/notification-service-api:$IMAGE_TAG .
          az acr login --name ${{ secrets.ACR_NAME }}
          docker push $REGISTRY/gateway-api:$IMAGE_TAG
          docker push $REGISTRY/auth-service-api:$IMAGE_TAG
          docker push $REGISTRY/catalog-service-api:$IMAGE_TAG
          docker push $REGISTRY/inventory-service-api:$IMAGE_TAG
          docker push $REGISTRY/ordering-service-api:$IMAGE_TAG
          docker push $REGISTRY/notification-service-api:$IMAGE_TAG

      - name: Scan built images
        run: |
          for image in \
            $REGISTRY/gateway-api:$IMAGE_TAG \
            $REGISTRY/auth-service-api:$IMAGE_TAG \
            $REGISTRY/catalog-service-api:$IMAGE_TAG \
            $REGISTRY/inventory-service-api:$IMAGE_TAG \
            $REGISTRY/ordering-service-api:$IMAGE_TAG \
            $REGISTRY/notification-service-api:$IMAGE_TAG
          do
            trivy image --severity CRITICAL,HIGH --ignore-unfixed --exit-code 1 "$image"
          done

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file infra/bicep/main.bicep \
            --parameters infra/bicep/main.parameters.json \
            --parameters containerRegistryServer=$REGISTRY \
            --parameters containerRegistryUsername=${{ secrets.ACR_USERNAME }} \
            --parameters containerRegistryPassword=${{ secrets.ACR_PASSWORD }} \
            --parameters imageTag=$IMAGE_TAG

      - name: Smoke test deployed environment
        run: |
          if [ -z "$ACA_GATEWAY_URL" ]; then
            echo "ACA_GATEWAY_URL is not set. Skip smoke test."
            exit 0
          fi

          curl --fail --silent "$ACA_GATEWAY_URL/"
          curl --fail --silent "$ACA_GATEWAY_URL/catalog/health"
          curl --fail --silent "$ACA_GATEWAY_URL/inventory/health"
          curl --fail --silent "$ACA_GATEWAY_URL/ordering/health"
          curl --fail --silent "$ACA_GATEWAY_URL/notification/health"
