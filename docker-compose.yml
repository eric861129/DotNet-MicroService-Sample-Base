services:
  gateway-api:
    build:
      context: .
      dockerfile: src/Gateway/Gateway.Api/Dockerfile
    ports:
      - "${GATEWAY_PORT}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS}
      Security__Jwt__Issuer: ${JWT_ISSUER}
      Security__Jwt__Audience: ${JWT_AUDIENCE}
      Security__Jwt__SigningKey: ${JWT_SIGNING_KEY}
      ReverseProxy__Clusters__catalog-cluster__Destinations__catalog-destination__Address: ${CATALOG_API_INTERNAL_URL}
      ReverseProxy__Clusters__ordering-cluster__Destinations__ordering-destination__Address: ${ORDERING_API_INTERNAL_URL}
    depends_on:
      - auth-service-api
      - catalog-service-api
      - ordering-service-api

  auth-service-api:
    build:
      context: .
      dockerfile: src/Identity/AuthService.Api/Dockerfile
    ports:
      - "${AUTH_SERVICE_PORT}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS}
      Auth__Jwt__Issuer: ${JWT_ISSUER}
      Auth__Jwt__Audience: ${JWT_AUDIENCE}
      Auth__Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Auth__Jwt__AccessTokenLifetimeMinutes: ${JWT_ACCESS_TOKEN_LIFETIME_MINUTES}
      Auth__Clients__0__ClientId: ${GATEWAY_CLIENT_ID}
      Auth__Clients__0__ClientSecret: ${GATEWAY_CLIENT_SECRET}
      Auth__Clients__0__AllowedScopes__0: catalog.read
      Auth__Clients__0__AllowedScopes__1: ordering.write

  catalog-service-api:
    build:
      context: .
      dockerfile: src/Services/Catalog/CatalogService.Api/Dockerfile
    ports:
      - "${CATALOG_SERVICE_PORT}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS}
      ConnectionStrings__CatalogDb: ${CATALOG_DB_CONNECTION_STRING}
    depends_on:
      - catalog-db

  ordering-service-api:
    build:
      context: .
      dockerfile: src/Services/Ordering/OrderingService.Api/Dockerfile
    ports:
      - "${ORDERING_SERVICE_PORT}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS}
      ConnectionStrings__OrderingDb: ${ORDERING_DB_CONNECTION_STRING}
      Services__Catalog__BaseUrl: ${CATALOG_API_INTERNAL_URL}
    depends_on:
      - ordering-db
      - catalog-service-api

  catalog-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SQL_SA_PASSWORD}
    ports:
      - "${CATALOG_DB_PORT}:1433"

  ordering-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SQL_SA_PASSWORD}
    ports:
      - "${ORDERING_DB_PORT}:1433"
