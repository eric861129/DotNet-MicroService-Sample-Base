syntax = "proto3";

option csharp_namespace = "OrderingService.Contracts";

package ordering;

service OrderingGrpc {
  rpc GetOrder (GetOrderRequest) returns (GetOrderReply);
}

message GetOrderRequest {
  string order_id = 1;
}

message GetOrderReply {
  string order_id = 1;
  string customer_email = 2;
  string status = 3;
  double total_amount = 4;
  repeated OrderItemReply items = 5;
}

message OrderItemReply {
  string product_id = 1;
  string sku = 2;
  string product_name = 3;
  double unit_price = 4;
  int32 quantity = 5;
}
