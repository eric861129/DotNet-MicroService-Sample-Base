syntax = "proto3";

option csharp_namespace = "NotificationService.Contracts";

package notification;

service NotificationGrpc {
  rpc GetRecentNotifications (GetRecentNotificationsRequest) returns (GetRecentNotificationsReply);
}

message GetRecentNotificationsRequest {
}

message GetRecentNotificationsReply {
  repeated NotificationReply notifications = 1;
}

message NotificationReply {
  string notification_id = 1;
  string order_id = 2;
  string recipient = 3;
  string message = 4;
  string created_at_utc = 5;
}
